<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Anything - Xem Giờ Thế Giới & Bản Đồ Múi Giờ Quốc Tế</title>

    <meta name="description" content="Ứng dụng xem giờ thế giới trực quan. Theo dõi đồng hồ địa phương và dễ dàng chuyển đổi múi giờ quốc tế thông qua bản đồ tương tác trực tuyến thông minh.">

    <style>
        body {
            margin: 0;
            background-color: #0f172a;
            color: #ffffff;
            font-family: sans-serif;
        }

        .timezone-path {
            fill: #334155;
            stroke: #1e293b;
            stroke-width: 0.5px;
            cursor: pointer;
            transition: fill 0.2s;
        }

        .timezone-path:hover {
            fill: #3b82f6;
        }

        #tooltip {
            position: absolute;
            display: none;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #3b82f6;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            pointer-events: none; /* Tránh cản trở sự kiện chuột */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }
    </style>
  <script type="module" crossorigin src="/assets/index-BVEExDQa.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BGJXoqiP.css">
</head>
<body>
    <h1 class="logo-text">Time Anything</h1>

    <p id="client-delay">Đang kiểm tra độ lệch thời gian hệ thống...</p>

    <div class="time-dashboard">
        <div class="clock-card local">
            <div class="card-label">Vị trí của bạn</div>
            <div id="local-tz" class="timezone-name">Đang tải...</div>
            <div id="local-time" class="time-display">00:00:00</div>
            <div id="local-date" class="date-display">---, --/--/----</div>
        </div>

        <div class="clock-card selected">
            <div class="card-label">Vùng được chọn trên bản đồ</div>
            <div id="selected-tz" class="timezone-name">Europe/London</div>
            <div id="selected-time" class="time-display">00:00:00</div>
            <div id="selected-date" class="date-display">---, --/--/----</div>
        </div>
    </div>

    <h2 style="text-align: center; margin-top: 20px;">Bản đồ Múi giờ Thế giới</h2>
    
    <div id="map-container" style="display: flex; justify-content: center;"></div>
    
    <div id="tooltip"></div>

    

    
</html>
