<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time anything</title>

    <style>
        body {
            margin: 0;
            background-color: #0f172a; /* Nền tối sang trọng */
            color: #ffffff;
            font-family: sans-serif;
        }
        /* Style cho các quốc gia trên bản đồ */
        .timezone-path {
            fill: #334155;
            stroke: #1e293b;
            stroke-width: 0.5px;
            cursor: pointer;
            transition: fill 0.2s;
        }
        /* Hiệu ứng sáng lên khi di chuột vào quốc gia */
        .timezone-path:hover {
            fill: #3b82f6;
        }
        /* Giao diện cho hộp thông tin (Tooltip) */
        #tooltip {
            position: absolute;
            display: none;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #3b82f6;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            pointer-events: none; /* Tránh cản trở sự kiện chuột */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }
    </style>
    <link rel="stylesheet" href="time.css">
</head>
<body>
    <div class="time-dashboard">
        <div class="clock-card local">
            <div class="card-label">Vị trí của bạn</div>
            <div id="local-tz" class="timezone-name">Đang tải...</div>
            <div id="local-time" class="time-display">00:00:00</div>
            <div id="local-date" class="date-display">---, --/--/----</div>
        </div>

        <div class="clock-card selected">
            <div class="card-label">Vùng được chọn trên bản đồ</div>
            <div id="selected-tz" class="timezone-name">Europe/London</div>
            <div id="selected-time" class="time-display">00:00:00</div>
            <div id="selected-date" class="date-display">---, --/--/----</div>
        </div>
    </div>

    <h2 style="text-align: center; margin-top: 20px;">Bản đồ Múi giờ Thế giới</h2>
    
    <div id="map-container" style="display: flex; justify-content: center;"></div>
    
    <div id="tooltip"></div>
    <script src="index.js" type="module"></script>

    <script src="time.js"></script>
</html>
